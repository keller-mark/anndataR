name: Question
description: Ask a question about using anndataR
labels: ["question", "triage"]
body:
  - type: markdown
    attributes:
      value: >
        Have a question about how to use anndataR?
        Please check existing documentation and issues first, but we're happy to help!

  - type: dropdown
    id: topic
    attributes:
      label: Topic Area
      description: What is your question related to?
      options:
        - Reading/writing H5AD files
        - Working with AnnData objects
        - Converting between formats (SCE, Seurat, Python)
        - Using different AnnData implementations (InMemory, HDF5, Reticulate)
        - Subsetting or manipulating data
        - Performance or memory usage
        - Installation or dependencies
        - Other
    validations:
      required: true

  - type: textarea
    id: question
    attributes:
      label: Your Question
      description: What would you like to know?
      placeholder: |
        Please be as specific as possible about what you're trying to accomplish
    validations:
      required: true
